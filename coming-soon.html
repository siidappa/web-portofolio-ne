<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Website Daffa Naufal Fachrezi akan segera hadir! Launching 5 Juli 2026.">
    <meta name="author" content="Daffa Naufal Fachrezi">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Stack+Sans+Notch:wght@200..700&display=swap">
    
    <link rel="icon" type="image/png" href="./image/me/Favicon.png">
    <meta name="theme-color" content="#006388">
    
    <title>Coming Soon - Daffa Naufal Fachrezi</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #006388;
            --secondary: #00abd9;
            --poppins: "Poppins", serif;
            --ssn: "Stack Sans Notch", sans-serif;
        }
        
        body {
            min-height: 100vh;
            background-color: #fbfbfb;
            background-image: linear-gradient(90deg, rgb(0 0 0 / 0.03) 1px, transparent 1px),
                              linear-gradient(rgb(0 0 0 / 0.03) 1px, transparent 1px);
            background-size: 1.5rem 1.5rem;
            background-position: center center;
            font-family: var(--poppins);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            font-family: var(--ssn);
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 2rem;
            font-weight: 800;
        }
        
        .coming-soon-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        h1 {
            font-family: var(--ssn);
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: #222;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 3rem;
            line-height: 1.7;
        }
        
        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .countdown-item {
            background: #fff;
            border-radius: 20px;
            padding: 1.5rem 2rem;
            box-shadow: 0 10px 30px rgb(0 0 0 / 0.05);
            border: 1px solid rgb(0 0 0 / 0.05);
            min-width: 120px;
            transition: all 0.3s ease;
        }
        
        .countdown-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgb(0 0 0 / 0.1);
        }
        
        .countdown-number {
            font-family: var(--ssn);
            font-size: 3rem;
            color: var(--primary);
            font-weight: 800;
            line-height: 1;
        }
        
        .countdown-label {
            font-size: 0.9rem;
            color: #888;
            margin-top: 0.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .launch-date {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem 2rem;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgb(0 0 0 / 0.05);
            border: 1px solid rgb(0 0 0 / 0.05);
            margin-bottom: 2rem;
        }
        
        .launch-icon {
            font-size: 1.8rem;
        }
        
        .launch-text {
            text-align: left;
        }
        
        .launch-text span {
            display: block;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .launch-text strong {
            font-size: 1.2rem;
            color: var(--primary);
            font-family: var(--ssn);
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .social-links a {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: #fff;
            border: 2px solid rgb(0 0 0 / 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #444;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgb(0 0 0 / 0.05);
        }
        
        .social-links a:hover {
            background: var(--primary);
            color: #fff;
            transform: translateY(-5px) rotate(5deg);
            box-shadow: 0 10px 25px rgb(0 99 136 / 0.35);
        }
        
        .decorative-circle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }
        
        .circle-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            right: -100px;
            animation: float 6s ease-in-out infinite;
        }
        
        .circle-2 {
            width: 200px;
            height: 200px;
            background: var(--secondary);
            bottom: -50px;
            left: -50px;
            animation: float 8s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(30px);
            }
        }
        
        @media (max-width: 768px) {
            .countdown {
                gap: 1rem;
            }
            
            .countdown-item {
                min-width: 90px;
                padding: 1.2rem 1.5rem;
            }
            
            .countdown-number {
                font-size: 2.3rem;
            }
            
            .countdown-label {
                font-size: 0.8rem;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 1.5rem;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .countdown {
                gap: 0.8rem;
            }
            
            .countdown-item {
                min-width: 75px;
                padding: 1rem 1.2rem;
            }
            
            .countdown-number {
                font-size: 2rem;
            }
            
            .launch-date {
                padding: 0.8rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="decorative-circle circle-1"></div>
    <div class="decorative-circle circle-2"></div>
    
    <div class="container">
        <div class="logo">KaryaDaffa</div>
        
        <div class="coming-soon-badge">Coming Soon</div>
        
        <h1>Website Portofolio<br>Sedang Dalam Persiapan</h1>
        
        <p class="subtitle">
            Bersiaplah untuk menjelajahi portofolio profesional saya yang menampilkan
            pengalaman kerja, sertifikasi, dan proyek-proyek terbaik. Launching akan segera!
        </p>
        
        <div class="countdown">
            <div class="countdown-item">
                <div class="countdown-number" id="days">00</div>
                <div class="countdown-label">Hari</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="hours">00</div>
                <div class="countdown-label">Jam</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="minutes">00</div>
                <div class="countdown-label">Menit</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="seconds">00</div>
                <div class="countdown-label">Detik</div>
            </div>
        </div>
        
        <div class="launch-date">
            <div class="launch-icon">🚀</div>
            <div class="launch-text">
                <span>Tanggal Launching</span>
                <strong>5 Juli 2026</strong>
            </div>
        </div>
        
        <div class="social-links">
            <a href="https://instagram.com/theonlydappp" target="_blank" aria-label="Instagram" style="text-decoration: none;">
                <span>📷</span>
            </a>
            <a href="https://github.com/siidappa" target="_blank" aria-label="GitHub" style="text-decoration: none;">
                <span>💻</span>
            </a>
            <a href="https://www.tiktok.com/@lookingfordapp" target="_blank" aria-label="TikTok" style="text-decoration: none;">
                <span>🎵</span>
            </a>
        </div>
    </div>
    
    <script>
        function updateCountdown() {
            const launchDate = new Date('July 5, 2026 00:00:00').getTime();
            const now = new Date().getTime();
            const distance = launchDate - now;
            
            if (distance > 0) {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                document.getElementById('days').textContent = String(days).padStart(2, '0');
                document.getElementById('hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            } else {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
            }
        }
        
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
