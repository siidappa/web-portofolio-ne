<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Website Portofolio Daffa akan segera hadir! Launching pada tanggal 10 Juli 2026">
    <meta name="author" content="Daffa Naufal Fachrezi">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Stack+Sans+Notch:wght@200..700&display=swap">
    
    <link rel="icon" type="image/png" href="./image/me/Favicon.png">
    <meta name="theme-color" content="#006388">
    
    <title>Coming Soon - Daffa Naufal Fachrezi</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #006388;
            --secondary: #00abd9;
            --poppins: "Poppins", serif;
            --ssn: "Stack Sans Notch", sans-serif;
        }
        
        body {
            min-height: 100vh;
            background-color: #fbfbfb;
            background-image: linear-gradient(90deg, rgb(0 0 0 / 0.03) 1px, transparent 1px),
                              linear-gradient(rgb(0 0 0 / 0.03) 1px, transparent 1px);
            background-size: 1.5rem 1.5rem;
            background-position: center center;
            font-family: var(--poppins);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            font-family: var(--ssn);
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 2rem;
            font-weight: 800;
        }
        
        .coming-soon-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        h1 {
            font-family: var(--ssn);
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: #222;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 3rem;
            line-height: 1.7;
            text-align: center;
        }
        
        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .countdown-item {
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            border-radius: 20px;
            padding: 1.5rem 2rem;
            box-shadow: 
                0 10px 30px rgb(0 0 0 / 0.05),
                0 0 0 1px rgb(0 99 136 / 0.08);
            border: none;
            min-width: 120px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .countdown-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% 100%;
            animation: gradientMove 2s linear infinite;
        }
        
        .countdown-item:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 
                0 20px 45px rgb(0 99 136 / 0.15),
                0 0 0 1px rgb(0 99 136 / 0.12);
        }
        
        .countdown-number {
            font-family: var(--ssn);
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            line-height: 1;
        }
        
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }
        
        .countdown-label {
            font-size: 0.9rem;
            color: #888;
            margin-top: 0.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .launch-date {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem 2rem;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgb(0 0 0 / 0.05);
            border: 1px solid rgb(0 0 0 / 0.05);
            margin-bottom: 2rem;
        }
        
        .launch-icon {
            font-size: 1.8rem;
        }
        
        .launch-text {
            text-align: left;
        }
        
        .launch-text span {
            display: block;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .launch-text strong {
            font-size: 1.2rem;
            color: var(--primary);
            font-family: var(--ssn);
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .social-links a {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: #fff;
            border: 2px solid rgb(0 0 0 / 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #444;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgb(0 0 0 / 0.05);
        }
        
        .social-links a:hover,
        .social-links a:active,
        .social-links a:focus-visible {
            background: var(--primary);
            color: #fff;
            transform: translateY(-5px) rotate(5deg);
            box-shadow: 0 10px 25px rgb(0 99 136 / 0.35);
        }
        
        .social-links a:active {
            transform: translateY(-2px) rotate(2deg);
        }
        
        .decorative-circle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }
        
        .circle-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            right: -100px;
            animation: float 6s ease-in-out infinite;
        }
        
        .circle-2 {
            width: 200px;
            height: 200px;
            background: var(--secondary);
            bottom: -50px;
            left: -50px;
            animation: float 8s ease-in-out infinite reverse;
        }
        
        .speed-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        
        .speed-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.4;
            animation: speedLine 3s linear infinite;
        }
        
        .speed-line:nth-child(1) {
            top: 20%;
            width: 200px;
            left: -250px;
            animation-duration: 4s;
        }
        
        .speed-line:nth-child(2) {
            top: 40%;
            width: 150px;
            left: -200px;
            animation-duration: 3.5s;
            animation-delay: 0.5s;
        }
        
        .speed-line:nth-child(3) {
            top: 60%;
            width: 180px;
            left: -230px;
            animation-duration: 4.5s;
            animation-delay: 1s;
        }
        
        .speed-line:nth-child(4) {
            top: 80%;
            width: 160px;
            left: -210px;
            animation-duration: 3.8s;
            animation-delay: 1.5s;
        }
        
        @keyframes speedLine {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(calc(100vw + 300px));
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(30px);
            }
        }
        
        /* Tablet (768px - 991px) */
        @media (max-width: 991px) {
            .container {
                max-width: 600px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1.05rem;
            }
            
            .countdown {
                gap: 1.2rem;
            }
            
            .countdown-item {
                min-width: 100px;
                padding: 1.3rem 1.6rem;
            }
            
            .countdown-number {
                font-size: 2.6rem;
            }
            
            .countdown-label {
                font-size: 0.85rem;
            }
        }
        
        /* Small Tablet (576px - 767px) */
        @media (max-width: 767px) {
            body {
                padding: 1.5rem;
            }
            
            .container {
                max-width: 100%;
            }
            
            .logo {
                font-size: 2.2rem;
                margin-bottom: 1.5rem;
            }
            
            .coming-soon-badge {
                font-size: 0.8rem;
                padding: 0.4rem 1.2rem;
                letter-spacing: 1.5px;
            }
            
            h1 {
                font-size: 2rem;
                margin-bottom: 0.8rem;
            }
            
            .subtitle {
                font-size: 0.95rem;
                margin-bottom: 2.5rem;
                text-align: left;
            }
            
            .countdown {
                gap: 0.9rem;
                margin-bottom: 2.5rem;
            }
            
            .countdown-item {
                min-width: 85px;
                padding: 1.1rem 1.3rem;
                border-radius: 16px;
            }
            
            .countdown-number {
                font-size: 2.2rem;
            }
            
            .countdown-label {
                font-size: 0.75rem;
                letter-spacing: 0.5px;
            }
            
            .launch-date {
                padding: 0.9rem 1.6rem;
                border-radius: 12px;
                margin-bottom: 1.8rem;
            }
            
            .launch-icon {
                font-size: 1.5rem;
            }
            
            .launch-text strong {
                font-size: 1.1rem;
            }
            
            .social-links a {
                width: 46px;
                height: 46px;
                font-size: 1.4rem;
                border-radius: 12px;
            }
            
            .circle-1 {
                width: 250px;
                height: 250px;
                top: -80px;
                right: -80px;
            }
            
            .circle-2 {
                width: 180px;
                height: 180px;
                bottom: -40px;
                left: -40px;
            }
        }
        
        /* Mobile (320px - 575px) */
        @media (max-width: 575px) {
            body {
                padding: 1.2rem;
            }
            
            .logo {
                font-size: 2rem;
                margin-bottom: 1.2rem;
            }
            
            .coming-soon-badge {
                font-size: 0.75rem;
                padding: 0.35rem 1rem;
                margin-bottom: 1.2rem;
            }
            
            h1 {
                font-size: 1.7rem;
                line-height: 1.25;
            }
            
            .subtitle {
                font-size: 0.9rem;
                line-height: 1.6;
                margin-bottom: 2rem;
                text-align: center;
            }
            
            .countdown {
                gap: 0.7rem;
                margin-bottom: 2rem;
            }
            
            .countdown-item {
                min-width: 72px;
                padding: 0.9rem 1rem;
                border-radius: 14px;
            }
            
            .countdown-number {
                font-size: 1.9rem;
            }
            
            .countdown-label {
                font-size: 0.7rem;
                margin-top: 0.3rem;
            }
            
            .launch-date {
                padding: 0.8rem 1.3rem;
                gap: 0.6rem;
            }
            
            .launch-icon {
                font-size: 1.4rem;
            }
            
            .launch-text span {
                font-size: 0.7rem;
            }
            
            .launch-text strong {
                font-size: 1rem;
            }
            
            .social-links {
                gap: 0.8rem;
            }
            
            .social-links a {
                width: 42px;
                height: 42px;
                font-size: 1.3rem;
                border-radius: 10px;
            }
            
            .circle-1 {
                width: 200px;
                height: 200px;
                top: -60px;
                right: -60px;
            }
            
            .circle-2 {
                width: 150px;
                height: 150px;
                bottom: -30px;
                left: -30px;
            }
        }
        
        /* Extra Small Mobile (up to 360px) */
        @media (max-width: 360px) {
            body {
                padding: 1rem;
            }
            
            .logo {
                font-size: 1.8rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .subtitle {
                font-size: 0.85rem;
            }
            
            .countdown-item {
                min-width: 65px;
                padding: 0.8rem 0.9rem;
            }
            
            .countdown-number {
                font-size: 1.7rem;
            }
            
            .countdown-label {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="decorative-circle circle-1"></div>
    <div class="decorative-circle circle-2"></div>
    <div class="speed-lines">
        <div class="speed-line"></div>
        <div class="speed-line"></div>
        <div class="speed-line"></div>
        <div class="speed-line"></div>
    </div>
    
    <div class="container">
        <div class="logo">KaryaDaffa</div>
        
        <div class="coming-soon-badge">🔥 Almost There</div>
        
        <h1>Website Portofolio<br>Akan Launching</h1>
        
        <p class="subtitle">
            Bersiaplah! Website portofolio profesional Daffa akan segera hadir dengan desain modern dan pengalaman menarik.
            Tunggu tanggalnya dan jangan sampai ketinggalan! 🚀
        </p>
        
        <div class="countdown">
            <div class="countdown-item">
                <div class="countdown-number" id="days">00</div>
                <div class="countdown-label">Hari</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="hours">00</div>
                <div class="countdown-label">Jam</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="minutes">00</div>
                <div class="countdown-label">Menit</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-number" id="seconds">00</div>
                <div class="countdown-label">Detik</div>
            </div>
        </div>
        
        <div class="launch-date">
            <div class="launch-icon">🚀</div>
            <div class="launch-text">
                <span>Tanggal Launching</span>
                <strong>10 Juli 2026</strong>
            </div>
        </div>
        
        <div class="social-links">
            <a href="https://instagram.com/theonlydappp" target="_blank" aria-label="Instagram" style="text-decoration: none;">
                <span>📷</span>
            </a>
            <a href="https://github.com/siidappa" target="_blank" aria-label="GitHub" style="text-decoration: none;">
                <span>💻</span>
            </a>
            <a href="https://www.tiktok.com/@lookingfordapp" target="_blank" aria-label="TikTok" style="text-decoration: none;">
                <span>🎵</span>
            </a>
        </div>
    </div>
    
    <script>
        function updateCountdown() {
            const launchDate = new Date('July 10, 2026 09:00:00').getTime();
            const now = new Date().getTime();
            const distance = launchDate - now;
            
            if (distance > 0) {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                document.getElementById('days').textContent = String(days).padStart(2, '0');
                document.getElementById('hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            } else {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
            }
        }
        
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
